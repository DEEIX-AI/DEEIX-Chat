name: deeix-chat

services:
  app:
    # 使用本地构建而不是拉取远程镜像
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
        GIT_COMMIT: ${GIT_COMMIT:-local}
        BUILD_TIME: ${BUILD_TIME:-}
    image: deeix-chat:local
    container_name: deeix-chat-app
    ports:
      # 映射到所有网络接口，便于外部访问
      - "8080:8080"
    volumes:
      - app_storage:/app/storage
      - app_data:/app/data
      # 使用 config.yaml 作为配置文件
      - ./config.yaml:/app/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deeix-chat
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai

volumes:
  app_storage:
    name: deeix-chat-app-storage
  app_data:
    name: deeix-chat-app-data

networks:
  deeix-chat:
    name: deeix-chat-network
